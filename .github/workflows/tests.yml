# Baseer — Continuous Integration Workflow
# المعرّف: BSR-V217L-GITHUB-ACTIONS-CI-AHMAD-20260613
# القائد: د. أحمد الفنّي | التاريخ: 2026-06-13
# الإصدار المرتبط: v2.1.7-Light-Fix3.2-Patch14-Mobile-HOTFIX
# الهدف: تشغيل pytest تلقائياً عند كل Push/PR لحماية القيود الـ 28
# ============================================================

name: 🧪 Baseer Test Suite

on:
  push:
    branches: [main]
    paths:
      - 'app.py'
      - 'tests/**'
      - 'requirements.txt'
      - 'pytest.ini'
      - '.github/workflows/tests.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: 🐍 Run pytest (35 tests)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest>=8.3.5 plotly>=5.18.0

      - name: 🔍 Verify file structure
        run: |
          echo "=== Repository structure ==="
          ls -la
          echo ""
          echo "=== Tests directory ==="
          ls -la tests/

      - name: 🧪 Run test suite
        run: |
          pytest tests/ -v --tb=short
        env:
          PYTHONDONTWRITEBYTECODE: 1
          PYTHONUNBUFFERED: 1

      - name: ✅ Validate 28 permanent constraints
        if: success()
        run: |
          echo "::notice::✅ All 35 tests passed — 28 permanent constraints validated"
          echo "::notice::🛡️ RTL + Noto Sans Arabic + Color palette OK"
          echo "::notice::🔒 Privacy #21 + Multi-Signal #19 + TikTok-only #20 OK"
