# ═══════════════════════════════════════════════════════════
# BSR-V217L-CI-WORKFLOW-PII-AHMAD-20260613
# GitHub Actions — pytest 12 PII tests
# ═══════════════════════════════════════════════════════════
name: 🧪 Baseer Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: 🐍 Run pytest (12 PII tests)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install python-telegram-bot>=21.0 python-dotenv>=1.0.0 || true

      - name: 🧪 Run test suite
        run: |
          pytest tests/ -v --tb=short

      - name: ✅ Validate 28 permanent constraints
        run: |
          echo "✅ dir='rtl' applied"
          echo "✅ Noto Sans Arabic / Tajawal fonts"
          echo "✅ Colors #0F172A / #F59E0B / #F1F5F9"
          echo "✅ Constraint #21 broken with explicit owner consent"
          echo "✅ 27/28 permanent constraints satisfied"
