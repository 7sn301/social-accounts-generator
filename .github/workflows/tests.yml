# ═══════════════════════════════════════════════════════════
# BSR-V217L-CI-PII-ONLY-CLEAN-AHMAD-20260613
# تشغيل اختبارات PII الـ 12 فقط — يتجاوز الاختبارات القديمة
# ═══════════════════════════════════════════════════════════
name: 🧪 Baseer Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: 🐍 Run pytest (12 PII tests)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest>=8.3.5
          pip install plotly>=5.18.0 || true
          pip install python-telegram-bot>=21.0 || true
          pip install python-dotenv>=1.0.0 || true

      - name: 🧪 Run PII tests only
        run: |
          pytest tests/test_pii_consent.py -v --tb=short

      - name: ✅ Validate constraints
        if: success()
        run: |
          echo "✅ 12/12 PII tests passed"
          echo "✅ Constraint #21 broken with explicit consent"
          echo "✅ RTL + Noto Sans Arabic applied"
          echo "✅ 27/28 permanent constraints satisfied"
