[pytest]
# معرّف: BSR-V217L-PYTEST-CONFIG-AHMAD-20260613
# القائد: د. أحمد الفنّي | التاريخ: 2026-06-13
# الإصدار المرتبط: v2.1.7-Light-Fix3.2-Patch14-Mobile-HOTFIX
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers
markers =
    constants: اختبارات الثوابت الجوهرية
    privacy: اختبارات قيود الخصوصية (#21)
    rtl: اختبارات اتجاه RTL والخطوط العربية
    integrity: اختبارات سلامة البيانات
    globe: اختبارات خريطة Plotly
